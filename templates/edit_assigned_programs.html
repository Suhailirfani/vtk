{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6 mt-6 border border-gray-200">
    <h3 class="text-xl font-bold text-blue-700 mb-4">
        Edit Assigned Programs for {{ contestant.name }}
    </h3>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            {% for program in all_programs %}
                <label class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-50 transition border border-gray-100">
                    <input type="checkbox" name="programs" value="{{ program.id }}"
                           class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 flex-shrink-0"
                           {% if program.id in assigned_program_ids %}checked{% endif %}>
                    <span class="text-gray-800 text-sm leading-tight">{{ program.name|upper }} - {{ program.category.name }}</span>
                </label>
            {% endfor %}
        </div>
        <button type="submit"
            class="btn btn-success">
            Update Programs
        </button>
    </form>
</div>
{% endblock %}
