{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center my-3">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-white text-primary fw-bold d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; font-size: 1.2rem; text-transform: uppercase;">
                        {{ user.username|slice:":2" }}
                    </div>
                    <div>
                        <h4 class="mb-0 fw-bold">Edit User Account</h4>
                        <p class="small mb-0 text-white-50">Modify details for {{ user.username }}</p>
                    </div>
                </div>
            </div>
            
            <div class="card-body p-4 bg-white">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fas fa-envelope"></i></span>
                            <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">User Role</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fas fa-user-tag"></i></span>
                            <select name="role" class="form-select">
                                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                                <option value="team" {% if user.role == 'team' %}selected{% endif %}>Team</option>
                                <option value="off_campus" {% if user.role == 'off_campus' %}selected{% endif %}>Off Campus</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-check form-switch mb-4 p-3 bg-light rounded-3 border">
                        <input class="form-check-input ms-0 me-2" type="checkbox" role="switch" id="isActiveSwitch" name="is_active" {% if user.is_active %}checked{% endif %}>
                        <label class="form-check-label fw-semibold text-dark" for="isActiveSwitch">Account Active & Enabled</label>
                        <div class="form-text small text-muted ms-0">Inactive accounts cannot log into the portal.</div>
                    </div>

                    <div class="d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-primary flex-fill fw-semibold py-2">
                            <i class="fas fa-save me-1"></i> Update User
                        </button>
                        <a href="{% url 'view_users' %}" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
