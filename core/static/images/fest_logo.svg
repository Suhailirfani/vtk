<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background Circle Radial Gradient -->
    <radialGradient id="festBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#07478d"/>
      <stop offset="70%" stop-color="#032652"/>
      <stop offset="100%" stop-color="#011229"/>
    </radialGradient>

    <!-- Metallic Gold Gradient -->
    <linearGradient id="festGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="25%" stop-color="#ffe082"/>
      <stop offset="50%" stop-color="#ffb300"/>
      <stop offset="75%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </linearGradient>

    <!-- Emerald Teal Accent Gradient -->
    <linearGradient id="festEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>

    <!-- Glow Drop Shadow -->
    <filter id="festShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#ffb300" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Outer Ring Badge Frame -->
  <circle cx="250" cy="250" r="236" fill="url(#festBg)" stroke="url(#festGold)" stroke-width="12"/>
  <circle cx="250" cy="250" r="218" fill="none" stroke="url(#festGold)" stroke-dasharray="6 6" stroke-width="3" opacity="0.6"/>

  <!-- Radiating Starburst Behind Trophy -->
  <g opacity="0.15" fill="url(#festGold)">
    <polygon points="250,50 265,235 450,250 265,265 250,450 235,265 50,250 235,235"/>
    <polygon points="250,50 265,235 450,250 265,265 250,450 235,265 50,250 235,235" transform="rotate(45 250 250)"/>
  </g>

  <!-- Main Emblem Artwork -->
  <g filter="url(#festShadow)">
    
    <!-- Outer Decorative Laurel Wreath Left -->
    <path d="M 100 250 C 90 170 160 110 210 90" fill="none" stroke="url(#festGold)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="102" cy="230" r="10" fill="url(#festGold)"/>
    <circle cx="115" cy="180" r="10" fill="url(#festGold)"/>
    <circle cx="145" cy="135" r="10" fill="url(#festGold)"/>

    <!-- Outer Decorative Laurel Wreath Right -->
    <path d="M 400 250 C 410 170 340 110 290 90" fill="none" stroke="url(#festGold)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="398" cy="230" r="10" fill="url(#festGold)"/>
    <circle cx="385" cy="180" r="10" fill="url(#festGold)"/>
    <circle cx="355" cy="135" r="10" fill="url(#festGold)"/>

    <!-- Left Trophy Handle -->
    <path d="M 155 160 C 95 160 95 260 170 280" fill="none" stroke="url(#festGold)" stroke-width="22" stroke-linecap="round"/>
    
    <!-- Right Trophy Handle -->
    <path d="M 345 160 C 405 160 405 260 330 280" fill="none" stroke="url(#festGold)" stroke-width="22" stroke-linecap="round"/>

    <!-- Main Cup Body -->
    <path d="M 160 130 H 340 C 340 130 350 265 250 310 C 150 265 160 130 160 130 Z" fill="url(#festGold)"/>

    <!-- Top Cup Lip -->
    <rect x="145" y="120" width="210" height="24" rx="12" fill="#ffffff"/>
    <rect x="148" y="123" width="204" height="18" rx="9" fill="url(#festGold)"/>

    <!-- Central Victory Star -->
    <g transform="translate(250, 205) scale(1.1)">
      <polygon points="0,-40 12,-12 40,-10 18,10 25,38 0,22 -25,38 -18,10 -40,-10 -12,-12" fill="#ffffff"/>
    </g>

    <!-- Base Stem & Foundation -->
    <path d="M 230 305 H 270 V 355 H 230 Z" fill="url(#festGold)"/>
    <rect x="210" y="350" width="80" height="18" rx="9" fill="#ffffff"/>
    
    <!-- Bottom Pedestal Shield -->
    <path d="M 170 365 H 330 L 345 420 H 155 L 170 365 Z" fill="url(#festGold)"/>
    <rect x="140" y="415" width="220" height="24" rx="8" fill="url(#festGold)"/>

    <!-- Emerald Banner Ribbon Accent -->
    <path d="M 120 440 Q 250 460 380 440 L 360 415 Q 250 435 140 415 Z" fill="url(#festEmerald)"/>

  </g>
</svg>
